<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #F8F9FA;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            text-align: center;
        }
        .flower-img {
            width: 100%;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            line-height: 1.8;
            color: #1c1c1e;
        }
        .highlight { color: #d63384; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.imgur.com/26257.jpg" alt="باقة ورد" class="flower-img">
    
    <div class="card">
        <p>أعتذرُ منكِ يا <span class="highlight">نبضي</span>؛ فأنا لا أطيقُ رؤية الحزن في عينيكِ، ولا أحتملُ أن يكون في قلبكِ عليّ شيءٌ من الضيق.</p>
        <p>أرجو أن تتقبلي اعتذاري عن هفوتي، فما كان قصدي إلا أن أرى ابتسامتكِ التي هي كل ما أرجوه. أتمنى أن نطوي صفحة هذا الخصام، وأن تعود الأمور إلى أجمل مما كانت.</p>
    </div>
</div>

</body>
</html>
