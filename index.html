<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #F2F2F7; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; text-align: center; }
        .flower-img { width: 100%; border-radius: 20px; margin-bottom: 20px; }
        .text { font-size: 18px; color: #1c1c1e; line-height: 1.8; text-align: right; }
        .highlight { color: #d63384; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://i.ibb.co/bW84v1x/26257.jpg" alt="باقة ورد" class="flower-img">
    <div class="text">
        أعتذرُ منكِ يا <span class="highlight">نبضي</span>؛ فأنا لا أطيقُ رؤية الحزن في عينيكِ، ولا أحتملُ أن يكون في قلبكِ عليّ شيءٌ من الضيق. <br><br>
        أرجو أن تتقبلي اعتذاري عن هفوتي، فما كان قصدي إلا أن أرى ابتسامتكِ التي هي كل ما أرجوه. أتمنى أن نطوي صفحة هذا الخصام، وأن تعود الأمور إلى أجمل مما كانت.
    </div>
</div>

</body>
</html>
